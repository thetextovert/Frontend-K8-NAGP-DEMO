apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: nagp-k8-demo-app-hpa
  namespace: nagp

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nagp-k8-demo-app

  minReplicas: 4
  maxReplicas: 8

  metrics:
    - type: Resource
      resource:
        name: cpu

        target:
          type: Utilization
          averageUtilization: 70
